AWSTemplateFormatVersion: '2010-09-09'
Description: 'Infraestructura Finsy - Jenkins, App y DB'

Parameters:
  LatestAmiId:
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/canonical/ubuntu/server/24.04/stable/current/amd64/hvm/ebs-gp3/ami-id'
  KeyName:
    Description: Nombre de la llave SSH
    Type: AWS::EC2::KeyPair::KeyName
    Default: vockey

Resources:
  FinsyS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub finsy-infra-deploy-${AWS::AccountId}

  FinsySecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Reglas de red para Finsy
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 5000
          ToPort: 5000
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: 0.0.0.0/0

  JenkinsInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: t3.small
      KeyName: !Ref KeyName
      IamInstanceProfile: LabInstanceProfile
      SecurityGroupIds: 
        - !Ref FinsySecurityGroup
      Tags:
        - Key: Name
          Value: Finsy-Jenkins-Build

  AppInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: t2.micro
      KeyName: !Ref KeyName
      IamInstanceProfile: LabInstanceProfile
      SecurityGroupIds: 
        - !Ref FinsySecurityGroup
      Tags:
        - Key: Name
          Value: Finsy-App-Server

  DBInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: t2.micro
      KeyName: !Ref KeyName
      IamInstanceProfile: LabInstanceProfile
      SecurityGroupIds: 
        - !Ref FinsySecurityGroup
      Tags:
        - Key: Name
          Value: Finsy-DB-Server